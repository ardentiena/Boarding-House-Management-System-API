services:
  db:
    image: postgres:15-alpine
    container_name: boardinghouse-api-db-1
    environment:
      # Menggunakan DB_USERNAME (sesuai .env Anda)
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-boardinghousedatabasepassword}
      POSTGRES_DB: ${DB_NAME:-boardinghouse}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - internal-net
    healthcheck:
      # Pengecekan diselaraskan dengan variabel DB_USERNAME & DB_NAME Anda
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-boardinghouse}"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 10s

  web-api:
    build: .
    container_name: boardinghouse-api-web-api-1
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-boardinghousedatabasepassword}
      DB_NAME: ${DB_NAME:-boardinghouse}
      JWT_SECRET: ${JWT_SECRET}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal-net

networks:
  internal-net:
    driver: bridge

volumes:
  pgdata: