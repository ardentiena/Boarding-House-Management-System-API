# Spring Boot application properties
spring.application.name=boardinghouse-api

# Database configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:?DB_HOST is not set in .env}:${DB_PORT:5432}/${DB_NAME:?DB_NAME is not set in .env}
spring.datasource.username=${DB_USER:?DB_USER is not set in .env}
spring.datasource.password=${DB_PASSWORD:?DB_PASSWORD is not set in .env}
# Connection pool configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server configuration
server.port=8080

# JWT configuration
jwt.secret=${JWT_SECRET:?JWT_SECRET is not set in .env}
jwt.expiration=3600000

# Midtrans configuration
midtrans.server-key=${MIDTRANS_SERVER_KEY:?MIDTRANS_SERVER_KEY is not set in .env}
midtrans.client-key=${MIDTRANS_CLIENT_KEY:?MIDTRANS_CLIENT_KEY is not set in .env}

# CORS configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is not set in .env}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type
cors.allow-credentials=true

# Startup validation - ensure required environment variables are set
spring.datasource.validation-query=SELECT 1

# Security configuration
spring.security.user.name=${ADMIN_USERNAME:?ADMIN_USERNAME is not set in .env}
spring.security.user.password=${ADMIN_PASSWORD:?ADMIN_PASSWORD is not set in .env}