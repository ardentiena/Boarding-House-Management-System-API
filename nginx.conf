server {
    listen 80;
    server_name localhost;
    
    # Logging ke stdout (untuk container)
    access_log /dev/stdout;
    error_log /dev/stderr;
    
    # Proxy API requests ke Spring Boot
    location /api/ {
        proxy_pass http://web-api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Proxy auth requests
    location /api/auth/ {
        proxy_pass http://web-api:8080/api/auth/;
        proxy_set_header Host $host;
    }
    
    # Health check
    location /health {
        proxy_pass http://web-api:8080/health;
        proxy_set_header Host $host;
    }
    
    # Root untuk static files (opsional, untuk frontend nanti)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}